<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>draw(ward)robe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Inline brand style adjustments to ensure the name renders correctly */
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; /* Bold/Extra bold */
      font-size: 22px;
      letter-spacing: -0.5px;
      color: #000000; /* Bold black font */
    }

    .logo span.strike-text { 
      text-decoration: line-through;
      color: #000000; /* Muted gray line-through for styling */
      font-weight: 600;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">draw(<span class="strike-text">ward</span>)robe</div>
    
    <div class="toolbar">
      <button class="tool-btn active" id="penBtn">✏ PEN</button>
      <button class="tool-btn" id="eraserBtn">◻ ERASER</button>
      <input type="range" class="size-slider" id="sizeSlider" min="1" max="40" value="4" title="Brush size"/>
      <div class="color-swatches">
        <div class="color-swatch active" style="background:#f0f0f0" data-color="#f0f0f0"></div>
        <div class="color-swatch" style="background:#c8f04a" data-color="#c8f04a"></div>
        <div class="color-swatch" style="background:#ff6b6b" data-color="#ff6b6b"></div>
        <div class="color-swatch" style="background:#60a5fa" data-color="#60a5fa"></div>
        <div class="color-swatch" style="background:#f97316" data-color="#f97316"></div>
      </div>
      <button class="tool-btn" id="clearBtn">✕ CLEAR</button>
    </div>
  </header>

  <div class="main">

    <div class="draw-panel">
      <div class="panel-label">// draw your sketch</div>
      <canvas id="sketchCanvas"></canvas>
    </div>

    <div class="result-panel">
      <div class="panel-label">// generated image</div>

      <div class="result-inner">
        <div class="placeholder" id="placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9l4-4 4 4 4-4 4 4"/>
            <circle cx="8.5" cy="14.5" r="1.5"/>
          </svg>
          <p>Draw something on<br/>the left, then hit<br/>Generate.</p>
        </div>
        <img id="resultImg" alt="Generated image"/>
        <div class="loading-overlay" id="loadingOverlay">
          <div class="spinner"></div>
          <div class="loading-text">GENERATING...</div>
        </div>
      </div>

      <div id="errorMsg"></div>

      <div class="prompt-bar">
        <label>PROMPT</label>
        <input type="text" id="promptInput" placeholder="realistic photo, high detail..." value="realistic photo, highly detailed, vivid colors"/>
      </div>
      <div class="generate-bar">
        <button id="generateBtn">✦ Generate Image</button>
      </div>
    </div>

  </div>
  <link rel="stylesheet" href="style.css"/>
  <script src="canvas.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
